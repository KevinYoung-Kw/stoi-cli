name: stoi
description: |
  STOI (Shit Token On Investment) - Token 效率分析工具
  分析 Claude Code 对话的 Token 使用效率，评估输出质量，并语音播报结果。

commands:
  analyze:
    description: 分析会话 Token 效率
    usage: /stoi analyze [--dramatic]
    parameters:
      dramatic:
        type: flag
        description: 启用戏剧化语音播报
        required: false

  tts:
    description: 测试 TTS 语音播报
    usage: /stoi tts "message"
    parameters:
      message:
        type: string
        description: 要播报的文本
        required: true

  blame:
    description: 找出 Token 刺客（开发中）
    usage: /stoi blame

  stats:
    description: 查看统计（开发中）
    usage: /stoi stats

entrypoint: python3 stoi.py
